services:
  deps:
    image: node:22-alpine
    working_dir: /workspace
    command: >
      sh -lc "corepack enable && CI=true pnpm install --frozen-lockfile"
    volumes:
      - ./:/workspace

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tincan}
      POSTGRES_USER: ${POSTGRES_USER:-tincan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tincan}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-tincan} -d ${POSTGRES_DB:-tincan}']
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  api:
    image: node:22-alpine
    working_dir: /workspace
    command: >
      sh -lc "corepack enable && pnpm --filter @tincan/api build && pnpm --filter @tincan/api start"
    environment:
      PORT: ${API_PORT:-4000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-tincan}:${POSTGRES_PASSWORD:-tincan}@postgres:5432/${POSTGRES_DB:-tincan}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-me}
      CORS_ORIGIN: http://${PUBLIC_HOST:-localhost}:${WEB_PORT:-5173},http://127.0.0.1:${WEB_PORT:-5173}
      UPLOADS_BASE_URL: http://${PUBLIC_HOST:-localhost}:${API_PORT:-4000}/uploads
    ports:
      - '${API_PORT:-4000}:4000'
    volumes:
      - ./:/workspace
    depends_on:
      deps:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    image: node:22-alpine
    working_dir: /workspace
    command: >
      sh -lc "corepack enable && pnpm --filter @tincan/web dev --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_URL: http://${PUBLIC_HOST:-localhost}:${API_PORT:-4000}
    ports:
      - '${WEB_PORT:-5173}:5173'
    volumes:
      - ./:/workspace
    depends_on:
      deps:
        condition: service_completed_successfully
      api:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
